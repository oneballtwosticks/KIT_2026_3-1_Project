<!DOCTYPE html>
<html>
<head>
  <title>Callback</title>
</head>
<body>
  <h1>Callback Page</h1>

  <pre id="output"></pre>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    document.getElementById("output").innerText =
      "Authorization Code: " + code;
  </script>
</body>
</html>
