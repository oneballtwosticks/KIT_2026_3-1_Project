<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>CloudGuard</title>
</head>
<body>
  <h1>Callback Page</h1>
  <h2>환영합니다.</h2>
  <h2>현재 개발중인 페이지 입니다.</h2>

  <pre id="output"></pre>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    document.getElementById("output").innerText =
      "Authorization Code: " + code;
  </script>
</body>
</html>
