<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>CloudGuard</title>
</head>
<body>
  <h1>Index Page</h1>
  <h2>AWS 클라우드 보안을 위한 SaaS 서비스 입니다.</h2>
  <h2>로그인 후 이용할 수 있습니다.</h2>


  <button onclick="login()">Login</button>

  <script>
    const domain = "https://ap-northeast-2tztzoi5my.auth.ap-northeast-2.amazoncognito.com";
    const clientId = "3pthcjpfpgid04dauvupj5sspd";

    const redirectUri =
      "https://saas-275023965558-ap-northeast-2-an.s3.ap-northeast-2.amazonaws.com/callback.html";

    function login() {
      const url =
        `${domain}/login?client_id=${clientId}` +
        `&response_type=code` +
        `&scope=openid+email+phone` +
        `&redirect_uri=${encodeURIComponent(redirectUri)}`;

      window.location.href = url;
    }
  </script>
</body>
</html>
